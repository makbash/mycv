<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mustafa Akbaş - CV</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#2c2c2c;display:flex;flex-direction:column;align-items:center;height:100vh;font-family:'Segoe UI',sans-serif}
  .toolbar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:#1B2838;width:100%;justify-content:center}
  .lang-toggle{display:flex;background:#243447;border-radius:20px;overflow:hidden}
  .lang-btn{padding:6px 20px;font-size:12px;font-weight:700;color:#B0B8C4;cursor:pointer;border:none;background:transparent;letter-spacing:.5px;transition:all .2s}
  .lang-btn.active{background:#D4A843;color:#1B2838}
  .lang-btn:hover:not(.active){color:#EAEAEA}
  .dl-btn{padding:6px 16px;font-size:11px;font-weight:600;color:#EAEAEA;background:#243447;border:1px solid #3a4f63;border-radius:16px;cursor:pointer;text-decoration:none;transition:all .2s}
  .dl-btn:hover{background:#D4A843;color:#1B2838;border-color:#D4A843}
  .pdf-wrap{flex:1;width:100%;max-width:900px}
  .pdf-wrap embed{width:100%;height:100%;border:none}
  @media(max-width:600px){.toolbar{flex-wrap:wrap}}
</style>
</head>
<body>

<div class="toolbar">
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('tr')">TR</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>
  <a class="dl-btn" id="dl" href="cv_tr.pdf" download>⬇ PDF</a>
</div>

<div class="pdf-wrap">
  <embed id="viewer" src="cv_tr.pdf" type="application/pdf">
</div>

<script>
function setLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim().toLowerCase() === lang));
  const file = 'cv_' + lang + '.pdf';
  document.getElementById('viewer').src = file;
  document.getElementById('dl').href = file;
}
if (location.hash === '#en') setLang('en');
</script>
</body>
</html>
